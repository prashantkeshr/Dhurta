<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="Dhurta — a sovereign, privacy-native browser by Dhurta.inc">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1120"/>
      <stop offset="1" stop-color="#05070E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FF4500" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FF4500" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#8A94A8"/>
      <stop offset="0.45" stop-color="#FFB300"/>
      <stop offset="0.5" stop-color="#FFE7B0"/>
      <stop offset="0.55" stop-color="#FF4500"/>
      <stop offset="1" stop-color="#8A94A8"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF4500"/>
      <stop offset="1" stop-color="#3A6FBF"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Ground -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- Pulsing glow behind the mark -->
  <ellipse cx="600" cy="150" rx="360" ry="120" fill="url(#glow)">
    <animate attributeName="opacity" values="0.35;0.7;0.35" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="330;380;330" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Trishula mark (three-prong) with glow pulse -->
  <g transform="translate(600,96)" stroke="#FF4500" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g filter="url(#soft)" opacity="0.8">
      <path d="M0,-46 L0,44 M-22,-30 Q-24,-8 -8,-2 M22,-30 Q24,-8 8,-2 M0,-52 L-10,-38 M0,-52 L10,-38"/>
      <animate attributeName="opacity" values="0.4;0.95;0.4" dur="2.6s" repeatCount="indefinite"/>
    </g>
    <path d="M0,-46 L0,44 M-22,-30 Q-24,-8 -8,-2 M22,-30 Q24,-8 8,-2 M0,-52 L-10,-38 M0,-52 L10,-38" stroke="#FFB300"/>
    <circle cx="0" cy="50" r="4" fill="#FF4500" stroke="none">
      <animate attributeName="r" values="3;5;3" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Wordmark with moving shimmer -->
  <text x="600" y="210" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="bold" letter-spacing="14" fill="url(#shimmer)">DHURTA</text>

  <!-- Subtitle -->
  <text x="600" y="246" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" letter-spacing="7" fill="#7A8BA8">SOVEREIGN · PRIVACY-NATIVE · BROWSER</text>

  <!-- Animated accent underline -->
  <rect x="470" y="262" width="260" height="2" fill="url(#accent)">
    <animate attributeName="width" values="120;260;120" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="540;470;540" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Org + version badge -->
  <text x="600" y="292" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" letter-spacing="3" fill="#FF4500">Dhurta.inc</text>
  <text x="600" y="292" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" letter-spacing="3" fill="#4A5870" dx="120">v1.0.8.0</text>
</svg>
