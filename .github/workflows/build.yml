name: 🔱 Dhurta — Build & Release (Dhurta.inc)

# Triggers:
#   • Any v* tag push → full build + publish a DRAFT GitHub Release
#   • workflow_dispatch → manual run (android always; iOS only if opted in)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_ios:
        description: "Also build iOS (needs the Xcode project — off until scaffolded/signed)"
        type: boolean
        default: false

permissions:
  contents: write

# ── Project identity (single source of truth in package.json; echoed here for
#    CI log clarity). Do NOT hardcode these — electron-builder reads package.json.
env:
  APP_NAME: Dhurta
  ORG_NAME: Dhurta.inc
  HOMEPAGE: https://dhurta.com

jobs:
  # ── @dhurta/core — build + typecheck the shared package once, upstream of all ──
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build & typecheck @dhurta/core
        # Build from the repo ROOT, not packages/core: a subdir install produces
        # broken dependency hoisting (esbuild becomes unresolvable for tsup). The
        # root install hoists everything correctly. --legacy-peer-deps is required
        # for the workspace's React version mismatch (mobile/ui expansion pkgs),
        # and the non-fatal postinstall wrapper means the Electron native-deps
        # rebuild can't break this pure-TypeScript job.
        run: |
          npm install --legacy-peer-deps
          npm run build:core
          node ./node_modules/typescript/bin/tsc --noEmit -p packages/core/tsconfig.json
      - uses: actions/upload-artifact@v4
        with:
          name: dhurta-core-dist
          path: packages/core/dist

  # ── Desktop: Windows, macOS, Linux ──
  desktop:
    needs: core
    strategy:
      fail-fast: false
      matrix:
        include:
          # windows-2022 is the stable LTS runner; windows-latest now maps to
          # windows-2025 which has changed default toolchain configuration and
          # can cause "Set up job" failures for native Node module builds.
          - os: windows-2022
            name: windows
          - os: macos-latest
            name: macos
          - os: ubuntu-latest
            name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Python 3 is required by node-gyp to compile better-sqlite3 on Windows.
      # windows-2022 runners ship Python 3.x but pip may not find it by default.
      - name: Setup Python (Windows — node-gyp native build)
        if: matrix.name == 'windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Linux ARM cross-compile toolchain (Raspberry Pi / ChromeOS arm64).
      - name: Enable ARM cross-build deps (Linux)
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo dpkg --add-architecture arm64 || true
          sudo apt-get install -y --no-install-recommends rpm

      - name: Install dependencies
        # The workspace has a known React peer-version mismatch; legacy resolution
        # is the standard fix (matches local dev). npm ci would fail on it.
        # npm_config_* env vars pass node-gyp settings cross-shell on all OSes.
        # msvs_version=2022 points node-gyp at the VS2022 toolchain that ships on
        # windows-2022 runners, avoiding "Could not find Visual Studio" errors.
        run: npm install --legacy-peer-deps
        env:
          npm_config_msvs_version: "2022"
          npm_config_python: python

      # Explicit rebuild of native modules against the packaged Electron ABI.
      # The postinstall script already attempts this but is non-fatal. Re-running
      # here guarantees better-sqlite3 is correctly linked before electron-builder
      # packages the asar — especially important on Windows where the first run
      # may have used the wrong MSVS version.
      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps
        continue-on-error: true

      - name: Typecheck
        run: |
          node ./node_modules/typescript/bin/tsc --noEmit
          node ./node_modules/typescript/bin/tsc -p tsconfig.electron.json --noEmit

      - name: Build renderer + main (no packaging)
        run: |
          npm run build:renderer
          npm run build:electron

      - name: Package + upload to GitHub Release (draft)
        # On a tag push → upload installers to a DRAFT GitHub Release.
        # The separate 'publish' job below promotes it to a real release
        # only after all three OS builds succeed.
        run: npx electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          # GITHUB_TOKEN is provided automatically; contents:write (set above)
          # lets electron-builder create/upload the release.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned builds. Do NOT pass empty CSC_* vars — electron-builder reads an
          # empty CSC_LINK as a bad file path and fails (Windows/macOS). Disabling
          # signing-identity discovery keeps macOS from attempting to sign.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Also keep raw artifacts on the workflow run itself (handy for testing).
      - uses: actions/upload-artifact@v4
        with:
          name: dhurta-${{ matrix.name }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.rpm
          if-no-files-found: ignore

  # ── Promote draft → published release (runs only when all 3 OS builds pass) ──
  publish:
    # Wait for BOTH desktop installers and the Android APK so the published
    # release contains every platform in one place.
    needs: [desktop, android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      # Pull the APK the android job built (uploaded as the dhurta-android-debug
      # artifact) so it can be attached to the release below.
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: dhurta-android-debug
          path: android-apk

      - name: Publish GitHub Release (all platforms)
        # electron-builder created the DRAFT release (named after package.json
        # version) during the desktop job and uploaded the installers to it. Here
        # we (1) rename + attach the Android APK to that same release, then
        # (2) promote the draft to a real published release.
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Attach the arm64-v8a APK — the architecture every modern phone uses.
          APK=$(find android-apk -name '*arm64*.apk' | head -n1)
          cp "$APK" "Dhurta-${VERSION}-android-arm64.apk"
          gh release upload "v${VERSION}" "Dhurta-${VERSION}-android-arm64.apk" --clobber --repo "${{ github.repository }}"
          gh release edit "v${VERSION}" --draft=false --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Android: GeckoView host via Gradle ──
  # Runs on a manual dispatch (produces the APK as a test artifact) AND on a v*
  # tag push (the publish job then attaches its APK to the GitHub Release).
  #
  # NOTE: this is the CANONICAL build path for the Android app. The local dev
  # machine's JDK cannot open an NIO selector (its AF_UNIX loopback self-pipe
  # fails with "Invalid argument"), so Gradle cannot run there at all — CI on a
  # Linux runner is where the APK is actually produced.
  android:
    needs: core
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ubuntu-latest ships the Android SDK, but pin/accept it explicitly so the
      # build never depends on a specific runner image's preinstalled versions.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Debug build → app-debug.apk is signed with the auto-generated debug key,
      # so it installs directly on any device (sideload) with no manual signing.
      # Release signing is deferred until there's a keystore secret to sign with.
      - name: Build debug APK
        working-directory: packages/android
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: dhurta-android-debug
          path: packages/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  # ── Android emulator smoke test ──
  # Boots a headless x86_64 Android VM on CI, installs the x86_64 APK, launches
  # the app, and captures a screenshot + logcat — proof the app actually runs
  # and renders (the dev machine can't run an emulator locally). Manual-dispatch
  # only so a flaky emulator never blocks a tagged release.
  android-emulator-test:
    needs: android
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dhurta-android-debug
          path: apk

      # The android-emulator-runner needs hardware acceleration (KVM) to boot in
      # reasonable time; this udev rule makes /dev/kvm usable by the runner user.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install + launch in emulator, capture proof
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: default
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            APK=$(find apk -name '*x86_64*.apk' | head -n1)
            echo "Installing $APK"
            adb install -r "$APK"
            # Launch via the LAUNCHER intent (debug applicationId has a .debug suffix).
            adb shell monkey -p express.hyperlocal.dhurta.debug -c android.intent.category.LAUNCHER 1
            sleep 25
            adb exec-out screencap -p > emulator-screen.png
            adb logcat -d -t 300 > logcat.txt || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dhurta-emulator-proof
          path: |
            emulator-screen.png
            logcat.txt
          if-no-files-found: warn

  # ── iOS: WebKit host via xcodebuild (requires macOS runner + provisioning) ──
  # Expansion scope, OPT-IN. Deferred: packages/ios currently has loose Swift
  # files but no Xcode project, so this job cannot build yet. Gated behind the
  # build_ios dispatch input (default false) so ordinary runs stay fully green
  # instead of showing a red iOS failure that masks real problems. Flip the
  # "Also build iOS" checkbox on Run workflow once the Xcode project exists.
  ios:
    needs: core
    if: github.event_name == 'workflow_dispatch' && inputs.build_ios
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build (unsigned archive)
        working-directory: packages/ios
        run: |
          xcodebuild -scheme Dhurta -configuration Release \
            -sdk iphoneos -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO clean build
