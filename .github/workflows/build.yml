name: 🔱 Dhurta — Build & Release (Dhurta.inc)

# Triggers:
#   • Any v* tag push → full build + publish a DRAFT GitHub Release
#   • workflow_dispatch → manual run (can also trigger android/ios)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

# ── Project identity (single source of truth in package.json; echoed here for
#    CI log clarity). Do NOT hardcode these — electron-builder reads package.json.
env:
  APP_NAME: Dhurta
  ORG_NAME: Dhurta.inc
  APP_VERSION: 1.0.8.0
  HOMEPAGE: https://dhurta.com

jobs:
  # ── @dhurta/core — build + typecheck the shared package once, upstream of all ──
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build & typecheck @dhurta/core
        # Build from the repo ROOT, not packages/core: a subdir install produces
        # broken dependency hoisting (esbuild becomes unresolvable for tsup). The
        # root install hoists everything correctly. --legacy-peer-deps is required
        # for the workspace's React version mismatch (mobile/ui expansion pkgs),
        # and the non-fatal postinstall wrapper means the Electron native-deps
        # rebuild can't break this pure-TypeScript job.
        run: |
          npm install --legacy-peer-deps
          npm run build:core
          node ./node_modules/typescript/bin/tsc --noEmit -p packages/core/tsconfig.json
      - uses: actions/upload-artifact@v4
        with:
          name: dhurta-core-dist
          path: packages/core/dist

  # ── Desktop: Windows, macOS (universal), Linux x64+arm64 (Pi/ChromeOS) ──
  desktop:
    needs: core
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
          - os: ubuntu-latest
            name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Linux ARM cross-compile toolchain (Raspberry Pi / ChromeOS arm64).
      - name: Enable ARM cross-build deps (Linux)
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo dpkg --add-architecture arm64 || true
          sudo apt-get install -y --no-install-recommends rpm

      - name: Install dependencies
        # The workspace has a known React peer-version mismatch; legacy resolution
        # is the standard fix (matches local dev). npm ci would fail on it.
        run: npm install --legacy-peer-deps

      - name: Typecheck
        run: |
          node ./node_modules/typescript/bin/tsc --noEmit
          node ./node_modules/typescript/bin/tsc -p tsconfig.electron.json --noEmit

      - name: Build renderer + main (no packaging)
        run: |
          npm run build:renderer
          npm run build:electron

      - name: Package + publish to GitHub Release
        # On a tag push → publish a DRAFT GitHub Release with installers attached
        # (owner/repo auto-detected from the checkout). Otherwise just build.
        run: npx electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          # GITHUB_TOKEN is provided automatically; contents:write (set above)
          # lets electron-builder create/upload the release.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned builds. Do NOT pass empty CSC_* vars — electron-builder reads an
          # empty CSC_LINK as a bad file path and fails (Windows/macOS). Disabling
          # signing-identity discovery keeps macOS from attempting to sign.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Also keep raw artifacts on the workflow run itself (handy for testing).
      - uses: actions/upload-artifact@v4
        with:
          name: dhurta-${{ matrix.name }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.rpm
          if-no-files-found: ignore

  # ── Android: GeckoView host via Gradle ──
  # Expansion scope — not part of the desktop release. Runs only on a manual
  # dispatch, never on release tags, so tagged desktop releases stay green.
  android:
    needs: core
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Build APK
        working-directory: packages/android
        run: ./gradlew assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: dhurta-android
          path: packages/android/app/build/outputs/apk/release/*.apk

  # ── iOS: WebKit host via xcodebuild (requires macOS runner + provisioning) ──
  # Expansion scope — manual dispatch only, excluded from the desktop release.
  ios:
    needs: core
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build (unsigned archive)
        working-directory: packages/ios
        run: |
          xcodebuild -scheme Dhurta -configuration Release \
            -sdk iphoneos -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO clean build
