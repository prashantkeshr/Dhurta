<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; img-src * data: file:; script-src 'self' 'unsafe-inline'">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #141414; --surface: #1e1e1e; --border: #2a2a2a;
    --text: #d4d4d4; --muted: #606060; --accent: #FF4500;
  }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif; font-size: 12px;
    height: 100%; overflow: hidden; user-select: none;
  }
  body { display: flex; flex-direction: column; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 12px 8px; border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  .header-title { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
  .close-btn {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 13px; padding: 1px 5px; border-radius: 3px; line-height: 1;
  }
  .close-btn:hover { color: var(--accent); }

  .tools-list {
    flex: 1; overflow-y: auto; padding: 6px;
  }

  .tool-btn {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 9px 10px; border: 1px solid var(--border);
    background: none; color: var(--text); cursor: pointer; border-radius: 6px;
    transition: border-color .12s, background .12s; margin-bottom: 4px;
    text-align: left;
  }
  .tool-btn:hover { border-color: var(--accent); background: rgba(255,69,0,.07); }
  .tool-btn:active { background: rgba(255,69,0,.14); }
  .tool-btn:last-child { margin-bottom: 0; }

  .tool-icon {
    width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
    border: 1px solid #333; border-radius: 6px; background: #1a1a1a; flex-shrink: 0;
  }
  .tool-icon svg { width: 16px; height: 16px; }

  .tool-info { flex: 1; min-width: 0; }
  .tool-name { font-size: 11px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .tool-desc { font-size: 9px; color: var(--muted); line-height: 1.2; margin-top: 1px; }
  .tool-btn:hover .tool-name { color: #fff; }
  .tool-btn:hover .tool-icon { border-color: var(--accent); }

  .tool-badge {
    font-size: 8px; padding: 1px 5px; border-radius: 3px;
    background: rgba(255,69,0,.15); color: var(--accent); font-weight: 600;
    letter-spacing: .04em; text-transform: uppercase; flex-shrink: 0;
  }

  .section-label {
    font-size: 9px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
    color: var(--muted); padding: 8px 10px 4px; display: flex; align-items: center; gap: 6px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .footer {
    border-top: 1px solid var(--border); padding: 6px 10px;
    display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
    background: var(--surface);
  }
  .footer-note { font-size: 9px; color: var(--muted); }
</style>
</head>
<body>
  <div class="header">
    <span class="header-title">Dhurta Tools</span>
    <button class="close-btn" onclick="popup.close()">✕</button>
  </div>

  <div class="tools-list">
    <div class="section-label">Dhurta Ecosystem</div>

    <!-- Dhurta Setu -->
    <button class="tool-btn" id="btn-setu">
      <div class="tool-icon">
        <svg viewBox="0 0 16 16" fill="none" stroke="#FF4500" stroke-width="1.4">
          <path d="M2 12 L8 4 L14 12" stroke-linejoin="round"/>
          <line x1="5" y1="8" x2="11" y2="8"/>
          <circle cx="8" cy="8" r="1.2" fill="#FF4500" stroke="none"/>
        </svg>
      </div>
      <div class="tool-info">
        <div class="tool-name">Dhurta Setu</div>
        <div class="tool-desc">Bridge & web index platform</div>
      </div>
      <span class="tool-badge">Local</span>
    </button>

    <!-- Dhurta Connect -->
    <button class="tool-btn" id="btn-connect">
      <div class="tool-icon">
        <svg viewBox="0 0 16 16" fill="none" stroke="#FF4500" stroke-width="1.4">
          <circle cx="4" cy="8" r="2.2"/>
          <circle cx="12" cy="8" r="2.2"/>
          <line x1="6.2" y1="8" x2="9.8" y2="8" stroke-dasharray="1.5 1"/>
          <path d="M4 5.8 L4 3 L12 3 L12 5.8" stroke-width="1"/>
        </svg>
      </div>
      <div class="tool-info">
        <div class="tool-name">Dhurta Connect</div>
        <div class="tool-desc">P2P encrypted chat, call & file share</div>
      </div>
      <span class="tool-badge">Local</span>
    </button>

    <div class="section-label">Built-in</div>

    <!-- Dhurta Developer -->
    <button class="tool-btn" id="btn-developer">
      <div class="tool-icon">
        <svg viewBox="0 0 16 16" fill="none" stroke="#FF4500" stroke-width="1.4">
          <polyline points="5,4 2,8 5,12"/>
          <polyline points="11,4 14,8 11,12"/>
          <line x1="9" y1="3" x2="7" y2="13" stroke-width="1.2"/>
        </svg>
      </div>
      <div class="tool-info">
        <div class="tool-name">Dhurta Developer</div>
        <div class="tool-desc">DevTools, console & network inspector</div>
      </div>
    </button>

    <!-- Dhurta Omni -->
    <button class="tool-btn" id="btn-omni">
      <div class="tool-icon">
        <svg viewBox="0 0 16 16" fill="none" stroke="#FF4500" stroke-width="1.4">
          <rect x="2" y="2" width="5" height="5" rx="1"/>
          <rect x="9" y="2" width="5" height="5" rx="1"/>
          <rect x="2" y="9" width="5" height="5" rx="1"/>
          <rect x="9" y="9" width="5" height="5" rx="1"/>
        </svg>
      </div>
      <div class="tool-info">
        <div class="tool-name">Dhurta Omni</div>
        <div class="tool-desc">Privacy dashboard & security controls</div>
      </div>
    </button>

    <!-- Browser Connect -->
    <button class="tool-btn" id="btn-bridge">
      <div class="tool-icon">
        <svg viewBox="0 0 16 16" fill="none" stroke="#FF4500" stroke-width="1.4">
          <rect x="1" y="5" width="5" height="6" rx="1"/>
          <rect x="10" y="5" width="5" height="6" rx="1"/>
          <path d="M6 8 L10 8" stroke-dasharray="1.5 1"/>
          <circle cx="8" cy="8" r="1" fill="#FF4500" stroke="none"/>
        </svg>
      </div>
      <div class="tool-info">
        <div class="tool-name">Browser Connect</div>
        <div class="tool-desc">Sync tabs & state between Dhurta instances</div>
      </div>
    </button>
  </div>

  <div class="footer">
    <span class="footer-note">Dhurta Ecosystem Tools</span>
  </div>

  <script>
    document.getElementById('btn-setu').addEventListener('click', function() {
      popup.invoke('tools:open', 'setu')
      popup.close()
    })
    document.getElementById('btn-connect').addEventListener('click', function() {
      popup.invoke('tools:open', 'connect')
      popup.close()
    })
    document.getElementById('btn-developer').addEventListener('click', function() {
      popup.invoke('tools:open', 'developer')
      popup.close()
    })
    document.getElementById('btn-omni').addEventListener('click', function() {
      popup.invoke('tools:open', 'omni')
      popup.close()
    })
    document.getElementById('btn-bridge').addEventListener('click', function() {
      popup.invoke('tools:open', 'bridge')
      popup.close()
    })
  </script>
</body>
</html>
