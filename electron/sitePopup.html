<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #1e1e1e; --border: #2a2a2a;
    --text: #d4d4d4; --dim: #999999; --mut: #606060; --accent: #FF4500;
    --green: #22c55e; --red: #ef4444; --yellow: #f59e0b;
  }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: 'Consolas', 'Segoe UI', monospace, system-ui, sans-serif;
    font-size: 11px; height: 100%; overflow: hidden; user-select: none;
  }
  body { display: flex; flex-direction: column; }

  .header {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
    padding: 10px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .header-main { display: flex; align-items: center; gap: 7px; min-width: 0; }
  .header-icon { flex-shrink: 0; margin-top: 1px; }
  .header-text { min-width: 0; }
  .header-title { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .header-sub   { font-size: 9px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .close-btn {
    background: transparent; border: none; color: var(--mut); cursor: pointer;
    font-size: 12px; line-height: 1; flex-shrink: 0; padding: 2px;
    transition: color .15s;
  }
  .close-btn:hover { color: var(--accent); }

  .note { padding: 12px; font-size: 10px; color: var(--dim); line-height: 1.5; }

  .section { border-bottom: 1px solid var(--border); padding: 8px 12px; }
  .section-title {
    font-size: 8px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--dim); margin-bottom: 6px;
  }
  .row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 2px; }
  .row-label { font-size: 9px; color: var(--dim); flex-shrink: 0; }
  .row-value { font-size: 9px; text-align: right; word-break: break-all; }

  .perm-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 3px 6px; background: rgba(255,255,255,.03); margin-bottom: 2px;
  }
  .perm-label { font-size: 10px; color: var(--dim); }
  .perm-badge {
    font-size: 8px; color: var(--red); border: 1px solid rgba(239,68,68,.4); padding: 0 3px;
  }
  .hint { font-size: 8px; color: var(--dim); margin-top: 5px; line-height: 1.4; }

  .action-btn {
    font-size: 9px; padding: 4px 8px; border: 1px solid; border-radius: 2px;
    cursor: pointer; font-family: inherit; background: transparent; transition: opacity .15s;
  }
  .action-btn:disabled { opacity: .4; cursor: default; }

  .footer {
    padding: 6px 12px; border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 5px; flex-shrink: 0;
  }
  .footer-text { font-size: 8px; color: var(--dim); }

  .loading { padding: 16px; text-align: center; font-size: 10px; color: var(--dim); }
</style>
</head>
<body>

<div class="header">
  <div class="header-main">
    <span class="header-icon" id="headerIcon"></span>
    <div class="header-text">
      <div class="header-title" id="headerTitle">Loading…</div>
      <div class="header-sub" id="headerSub"></div>
    </div>
  </div>
  <button class="close-btn" id="btnClose">✕</button>
</div>

<div id="body"></div>

<div class="footer">
  <svg width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="#FF4500" stroke-width="1.1"><polygon points="5,1 9,9 1,9"/></svg>
  <span class="footer-text">Dhurta · Zero Telemetry · Sovereign Browser</span>
</div>

<script>
  const params = new URLSearchParams(location.search)
  const tabId  = parseInt(params.get('tabId') || '-1', 10)
  const url    = params.get('url') || ''
  const isDhurta = !url || url.startsWith('dhurta://') || url === 'about:blank'

  let cleared  = false
  let histDone = false

  function icon(kind) {
    if (kind === 'dhurta') return '<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="#FF4500" stroke-width="1.3"><polygon points="6.5,1 12,11.5 1,11.5"/><line x1="6.5" y1="5" x2="6.5" y2="8.5"/><circle cx="6.5" cy="10" r="0.5" fill="#FF4500" stroke="none"/></svg>'
    if (kind === 'https')  return '<svg width="12" height="13" viewBox="0 0 12 13" fill="none" stroke="#22c55e" stroke-width="1.3"><rect x="2" y="5.5" width="8" height="6.5" stroke-linecap="square"/><path d="M4 5.5V4a2 2 0 0 1 4 0v1.5"/></svg>'
    return '<svg width="12" height="13" viewBox="0 0 12 13" fill="none" stroke="#ef4444" stroke-width="1.3"><rect x="2" y="5.5" width="8" height="6.5" stroke-linecap="square"/><path d="M4 5.5V4a2 2 0 0 1 4 0v1.5" stroke-dasharray="2 1"/></svg>'
  }

  function renderDhurta() {
    document.getElementById('headerIcon').innerHTML = icon('dhurta')
    document.getElementById('headerTitle').textContent = 'Dhurta Internal Page'
    document.getElementById('headerSub').textContent = url.replace('dhurta://', '')
    document.getElementById('body').innerHTML =
      '<div class="note">This is a built-in Dhurta page. No external connections are made from this page.</div>'
  }

  function renderLoading() {
    document.getElementById('body').innerHTML = '<div class="loading">Loading…</div>'
  }

  function renderInfo(info) {
    if (!info) {
      document.getElementById('headerTitle').textContent = 'Unknown'
      document.getElementById('body').innerHTML = '<div class="loading">No site information available.</div>'
      return
    }
    document.getElementById('headerIcon').innerHTML = icon(info.isHttps ? 'https' : 'http')
    document.getElementById('headerTitle').textContent = info.domain
    document.getElementById('headerSub').textContent = info.isHttps ? 'Connection is secure (HTTPS)' : 'Connection is NOT secure (HTTP)'

    const cookieVal = cleared ? '0 (cleared)' : String(info.cookieCount)
    const cookieColor = (info.cookieCount > 0 && !cleared) ? 'var(--yellow)' : 'var(--green)'

    document.getElementById('body').innerHTML = `
      <div class="section">
        <div class="section-title">Connection</div>
        <div class="row"><span class="row-label">Protocol</span><span class="row-value" style="color:${info.isHttps ? 'var(--green)' : 'var(--red)'}">${info.isHttps ? 'HTTPS' : 'HTTP'}</span></div>
        <div class="row"><span class="row-label">Domain</span><span class="row-value">${info.domain}</span></div>
        <div class="row"><span class="row-label">Origin</span><span class="row-value">${info.origin}</span></div>
      </div>

      <div class="section">
        <div class="section-title">Cookies &amp; Storage</div>
        <div class="row"><span class="row-label">Cookies</span><span class="row-value" style="color:${cookieColor}">${cookieVal}</span></div>
        <button class="action-btn" id="btnClearData" ${cleared ? 'disabled' : ''} style="color:${cleared ? '#666' : 'var(--red)'};border-color:${cleared ? '#444' : 'rgba(239,68,68,.4)'}">
          ${cleared ? '✓ Data Cleared' : 'Clear All Site Data'}
        </button>
        <div class="hint">Clears cookies, localStorage, IndexedDB, cache for ${info.domain}</div>
      </div>

      <div class="section">
        <div class="section-title">Permissions</div>
        ${[['📷','Camera'],['🎙','Microphone'],['📍','Location'],['🔔','Notifications']].map(([e,l]) =>
          `<div class="perm-row"><span class="perm-label">${e} ${l}</span><span class="perm-badge">BLOCKED</span></div>`
        ).join('')}
        <div class="hint">Dhurta blocks all sensitive permissions by default (Chakra Shield).</div>
      </div>

      <div class="section" style="border-bottom:none">
        <div class="section-title">History</div>
        <button class="action-btn" id="btnClearHistory" ${histDone ? 'disabled' : ''} style="color:${histDone ? '#666' : 'var(--yellow)'};border-color:${histDone ? '#444' : 'rgba(245,158,11,.4)'}">
          ${histDone ? '✓ History Removed' : `Remove ${info.domain} from History`}
        </button>
      </div>
    `

    const clearDataBtn = document.getElementById('btnClearData')
    if (clearDataBtn) clearDataBtn.onclick = async () => {
      await window.popup.invoke('site:clearData', tabId)
      cleared = true
      const updated = await window.popup.invoke('site:getInfo', tabId).catch(() => null)
      renderInfo(updated || info)
    }

    const clearHistBtn = document.getElementById('btnClearHistory')
    if (clearHistBtn) clearHistBtn.onclick = async () => {
      await window.popup.invoke('site:clearHistory', info.domain)
      histDone = true
      renderInfo(info)
    }
  }

  document.getElementById('btnClose').onclick = () => window.popup.close()

  if (isDhurta) {
    renderDhurta()
  } else {
    renderLoading()
    window.popup.invoke('site:getInfo', tabId).then(renderInfo).catch(() => renderInfo(null))
  }
</script>
</body>
</html>
