<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #141414; --surface: #1e1e1e; --border: #2a2a2a;
    --text: #d4d4d4; --muted: #606060; --accent: #FF4500;
    --green: #22c55e; --red: #ef4444; --yellow: #f59e0b;
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 12px; height: 100%; overflow: hidden; }
  body { display: flex; flex-direction: column; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px 8px; border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  .header-title { font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
  .header-actions { display: flex; gap: 6px; }
  .btn-sm {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    font-size: 10px; padding: 2px 8px; border-radius: 3px; cursor: pointer;
    font-family: inherit; transition: color .15s, border-color .15s;
  }
  .btn-sm:hover { color: var(--text); border-color: var(--text); }
  .btn-sm.accent { color: var(--accent); border-color: var(--accent); }
  .btn-sm.accent:hover { background: var(--accent); color: #fff; }

  .list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .list::-webkit-scrollbar { width: 4px; }
  .list::-webkit-scrollbar-track { background: transparent; }
  .list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .empty { padding: 24px 12px; text-align: center; color: var(--muted); font-size: 11px; }

  .item { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .item:last-child { border-bottom: none; }
  .item-row1 { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .item-icon { flex-shrink: 0; }
  .item-name {
    flex: 1; font-size: 11px; color: var(--text); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; font-family: 'Consolas', monospace;
  }
  .item-state { font-size: 10px; flex-shrink: 0; }
  .state-done   { color: var(--green); }
  .state-active { color: var(--accent); }
  .state-error  { color: var(--red); }
  .state-paused { color: var(--yellow); }

  .progress-wrap { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 5px; }
  .progress-bar  { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }

  .item-row2 { display: flex; align-items: center; gap: 4px; }
  .item-meta { flex: 1; color: var(--muted); font-size: 10px; font-family: monospace; }
  .icon-btn {
    background: transparent; border: none; color: var(--muted); cursor: pointer;
    padding: 2px 4px; border-radius: 2px; font-size: 11px; line-height: 1;
    transition: color .15s, background .15s;
  }
  .icon-btn:hover { color: var(--text); background: var(--border); }
  .icon-btn.danger:hover { color: var(--red); }

  .footer {
    padding: 7px 12px; border-top: 1px solid var(--border);
    background: var(--surface); display: flex; justify-content: flex-end; flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="header">
  <span class="header-title">Downloads</span>
  <div class="header-actions">
    <button class="btn-sm" id="btnClear">Clear done</button>
    <button class="btn-sm accent" id="btnAll">View all →</button>
  </div>
</div>

<div class="list" id="list">
  <div class="empty" id="empty">No downloads yet</div>
</div>

<div class="footer">
  <button class="btn-sm" id="btnClose">Close</button>
</div>

<script>
  let items = []

  function fmt(bytes) {
    if (!bytes || bytes < 0) return ''
    if (bytes < 1024) return bytes + ' B'
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB'
    if (bytes < 1024*1024*1024) return (bytes/1024/1024).toFixed(1) + ' MB'
    return (bytes/1024/1024/1024).toFixed(2) + ' GB'
  }

  function fmtSpeed(bps) {
    if (!bps) return ''
    return fmt(bps) + '/s'
  }

  function icon(state) {
    if (state === 'completed') return '<svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="#22c55e" stroke-width="1.6" stroke-linecap="round"><path d="M1.5 5.5l2.5 2.5 5-5"/></svg>'
    if (state === 'progressing') return '<svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="#FF4500" stroke-width="1.5" stroke-linecap="round"><line x1="5.5" y1="1" x2="5.5" y2="7.5"/><polyline points="2.5,4.5 5.5,8 8.5,4.5"/><line x1="1" y1="10" x2="10" y2="10"/></svg>'
    if (state === 'paused') return '<svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="2" width="2.5" height="7" rx=".5" fill="#f59e0b" stroke="none"/><rect x="6.5" y="2" width="2.5" height="7" rx=".5" fill="#f59e0b" stroke="none"/></svg>'
    return '<svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"><line x1="2" y1="2" x2="9" y2="9"/><line x1="9" y1="2" x2="2" y2="9"/></svg>'
  }

  function stateLabel(state, pct) {
    if (state === 'completed') return '<span class="state-done">Done</span>'
    if (state === 'progressing') return '<span class="state-active">' + (pct >= 0 ? pct + '%' : '…') + '</span>'
    if (state === 'paused') return '<span class="state-paused">Paused</span>'
    return '<span class="state-error">Failed</span>'
  }

  function render() {
    const list = document.getElementById('list')
    const empty = document.getElementById('empty')
    if (!items.length) { empty.style.display = ''; list.querySelectorAll('.item').forEach(el=>el.remove()); return }
    empty.style.display = 'none'

    // Re-render all items
    list.querySelectorAll('.item').forEach(el => el.remove())
    items.forEach(d => {
      const div = document.createElement('div')
      div.className = 'item'
      div.dataset.id = d.id
      const pct = d.percent >= 0 ? d.percent : (d.totalBytes > 0 ? Math.round(d.receivedBytes / d.totalBytes * 100) : -1)
      const isActive = d.state === 'progressing'
      const isDone = d.state === 'completed'
      const isPaused = d.state === 'paused'
      const meta = isActive
        ? [fmt(d.receivedBytes) + ' / ' + (d.totalBytes > 0 ? fmt(d.totalBytes) : '?'), d.speed ? fmtSpeed(d.speed) : ''].filter(Boolean).join('  ')
        : isDone ? (fmt(d.totalBytes || d.receivedBytes)) : ''

      div.innerHTML = `
        <div class="item-row1">
          <span class="item-icon">${icon(d.state)}</span>
          <span class="item-name" title="${d.filename}">${d.filename}</span>
          <span class="item-state">${stateLabel(d.state, pct)}</span>
        </div>
        ${isActive || isPaused ? `<div class="progress-wrap"><div class="progress-bar" style="width:${pct>=0?pct:0}%"></div></div>` : ''}
        <div class="item-row2">
          <span class="item-meta">${meta}</span>
          ${isDone ? `<button class="icon-btn" title="Open file" data-action="open" data-id="${d.id}">↗</button>` : ''}
          ${isDone ? `<button class="icon-btn" title="Show in folder" data-action="folder" data-id="${d.id}">📂</button>` : ''}
          ${isActive ? `<button class="icon-btn" title="Pause" data-action="pause" data-id="${d.id}">⏸</button>` : ''}
          ${isPaused ? `<button class="icon-btn" title="Resume" data-action="resume" data-id="${d.id}">▶</button>` : ''}
          ${!isDone ? `<button class="icon-btn danger" title="Cancel" data-action="cancel" data-id="${d.id}">✕</button>` : ''}
        </div>
      `
      list.appendChild(div)
    })
  }

  // Event delegation for action buttons
  document.getElementById('list').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]')
    if (!btn) return
    const { action, id } = btn.dataset
    if (action === 'open')   window.popup.invoke('downloads:openItem', id)
    if (action === 'folder') window.popup.invoke('downloads:showInFolder', id)
    if (action === 'pause')  window.popup.invoke('downloads:pause', id)
    if (action === 'resume') window.popup.invoke('downloads:resume', id)
    if (action === 'cancel') window.popup.invoke('downloads:cancel', id)
  })

  document.getElementById('btnClear').onclick = () => {
    window.popup.invoke('downloads:clear')
    items = items.filter(d => d.state === 'progressing' || d.state === 'paused')
    render()
  }

  document.getElementById('btnAll').onclick = () => {
    window.popup.invoke('popup:navigateMain', 'dhurta://downloads')
    window.popup.close()
  }

  document.getElementById('btnClose').onclick = () => window.popup.close()

  // Live updates from main process
  window.popup.on('downloads:data', data => { items = data; render() })
  window.popup.on('download:start',  d => { items.unshift(d); if (items.length > 20) items.length = 20; render() })
  window.popup.on('download:update', u => {
    const idx = items.findIndex(d => d.id === u.id)
    if (idx >= 0) { items[idx] = { ...items[idx], ...u }; render() }
  })
  window.popup.on('download:done', u => {
    const idx = items.findIndex(d => d.id === u.id)
    if (idx >= 0) { items[idx] = { ...items[idx], ...u }; render() }
  })
</script>
</body>
</html>
