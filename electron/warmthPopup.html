<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #141414; color: #d4d4d4;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 12px; height: 100%; overflow: hidden;
    user-select: none; -webkit-user-select: none;
  }
  body {
    display: flex; flex-direction: column;
    padding: 12px 14px 10px; gap: 10px;
  }
  .row1 { display: flex; align-items: center; gap: 8px; }
  .label {
    flex: 1; font-size: 11px; font-weight: 600;
    letter-spacing: .05em; color: #909090;
    text-transform: uppercase;
  }
  .value {
    font-size: 11px; font-family: 'Consolas', monospace;
    color: #FF4500; width: 34px; text-align: right;
  }
  .off-btn {
    background: transparent; border: 1px solid #2a2a2a;
    color: #606060; font-size: 10px; padding: 2px 7px;
    border-radius: 3px; cursor: pointer; font-family: inherit;
    transition: color .15s, border-color .15s;
  }
  .off-btn:hover { color: #ef4444; border-color: #ef4444; }

  input[type=range] {
    -webkit-appearance: none; width: 100%; height: 4px;
    border-radius: 2px; outline: none; cursor: pointer;
    background: linear-gradient(to right, #FF4500 0%, #FF4500 var(--pct), #2a2a2a var(--pct), #2a2a2a 100%);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: #FF4500;
    border: 2px solid #141414; cursor: pointer;
    box-shadow: 0 0 4px rgba(255,69,0,.5);
  }

  .hint { font-size: 10px; color: #505050; text-align: center; }
</style>
</head>
<body>

<div class="row1">
  <!-- Eye icon -->
  <svg width="14" height="12" viewBox="0 0 14 12" fill="none" stroke="#FF4500" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 6C2.5 2.5 5 1 7 1s4.5 1.5 6 5C11.5 9.5 9 11 7 11S2.5 9.5 1 6z"/>
    <circle cx="7" cy="6" r="2.2"/>
  </svg>
  <span class="label">Eye Protection</span>
  <span class="value" id="val">0%</span>
  <button class="off-btn" id="offBtn">Off</button>
</div>

<input type="range" id="slider" min="0" max="100" value="0">

<span class="hint">Reduces blue light · amber overlay on web pages</span>

<script>
  let level = 0

  const slider = document.getElementById('slider')
  const val    = document.getElementById('val')

  function setLevel(n) {
    level = Math.max(0, Math.min(100, n))
    slider.value = level
    val.textContent = level + '%'
    slider.style.setProperty('--pct', level + '%')
  }

  slider.addEventListener('input', () => {
    setLevel(parseInt(slider.value, 10))
    window.popup.invoke('display:setWarmth', level)
  })

  document.getElementById('offBtn').onclick = () => {
    setLevel(0)
    window.popup.invoke('display:setWarmth', 0)
  }

  // Receive initial value and live updates
  window.popup.on('warmth:value', v => setLevel(v))
</script>
</body>
</html>
