<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Dhurta</title>
<style>
  :root{ --neon:#22d3ff; --purple:#a855f7; --saffron:#ff7a2f; --text:#e9ecff; --muted:#767c9e;
    --glass:rgba(255,255,255,.055); --gbord:rgba(255,255,255,.11); }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; user-select:none; }
  body{ background:
      radial-gradient(60% 40% at 20% 12%, rgba(34,211,255,.14), transparent 60%),
      radial-gradient(55% 40% at 85% 22%, rgba(168,85,247,.16), transparent 60%),
      radial-gradient(90% 60% at 50% 118%, rgba(34,211,255,.06), transparent 70%),
      #06060c;
    min-height:100%; padding:34px 20px 26px; overflow-x:hidden; }
  body::before{ content:""; position:fixed; inset:0; z-index:-1; background-image:
      linear-gradient(rgba(255,255,255,.026) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.026) 1px,transparent 1px);
    background-size:34px 34px; mask-image:radial-gradient(ellipse 70% 55% at 50% 30%,#000 40%,transparent 100%); }

  .brand{ text-align:center; margin-top:14px; animation:rise .6s cubic-bezier(.2,.8,.2,1) both; }
  .logo{ width:74px; height:74px; object-fit:contain; filter:drop-shadow(0 0 22px rgba(255,140,40,.5)); animation:float 5s ease-in-out infinite; }
  .bword{ font-size:16px; font-weight:800; letter-spacing:.44em; margin-top:8px; color:var(--saffron);
    text-shadow:0 0 20px rgba(255,90,20,.5); }
  .btag{ font-size:8px; letter-spacing:.3em; color:#5c6188; margin-top:6px; }

  .clock{ text-align:center; margin-top:24px; font-variant-numeric:tabular-nums; animation:rise .6s .05s cubic-bezier(.2,.8,.2,1) both; }
  .clock .t{ font-size:44px; font-weight:800; letter-spacing:.06em; color:#f2f5ff; text-shadow:0 0 30px rgba(34,211,255,.25); }
  .clock .d{ font-size:10px; letter-spacing:.28em; color:#666c92; margin-top:4px; }

  form{ margin:26px auto 0; max-width:520px; display:flex; align-items:center; gap:10px;
    background:var(--glass); border:1px solid var(--gbord); border-radius:18px; padding:15px 16px;
    box-shadow:0 0 0 1px rgba(34,211,255,.32),0 10px 34px -12px rgba(34,211,255,.4),inset 0 0 22px rgba(34,211,255,.05);
    backdrop-filter:blur(16px); animation:rise .6s .1s cubic-bezier(.2,.8,.2,1) both; }
  form svg{ width:18px; height:18px; flex:0 0 auto; }
  input{ flex:1; background:transparent; border:none; outline:none; color:var(--text);
    font:14px 'Segoe UI',sans-serif; }
  input::placeholder{ color:#8b90b4; }
  button{ background:linear-gradient(135deg,var(--neon),var(--purple)); color:#04121a; border:none;
    font:800 11px 'Segoe UI',sans-serif; letter-spacing:.14em; padding:9px 16px; border-radius:12px; cursor:pointer; }

  .favs{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; max-width:520px; margin:26px auto 0; }
  .fav{ display:flex; flex-direction:column; align-items:center; gap:8px; text-decoration:none; color:#9aa0c6;
    animation:rise .5s cubic-bezier(.2,.8,.2,1) both; }
  .fav .ic{ width:52px; height:52px; border-radius:16px; display:flex; align-items:center; justify-content:center;
    background:var(--glass); border:1px solid var(--gbord); backdrop-filter:blur(10px); transition:transform .18s, box-shadow .18s; overflow:hidden; }
  .fav .ic img{ width:28px; height:28px; object-fit:contain; }
  .fav .ic .fallback{ font-size:20px; font-weight:800; }
  .fav:active .ic{ transform:scale(.9); box-shadow:0 0 20px -2px var(--neon); }
  .fav em{ font-style:normal; font-size:9px; letter-spacing:.02em; }

  .discover{ max-width:520px; margin:30px auto 0; animation:rise .6s .2s cubic-bezier(.2,.8,.2,1) both; }
  .dhead{ font-size:9px; letter-spacing:.24em; text-transform:uppercase; color:#7a80a6; display:flex; align-items:center; gap:8px; margin:0 2px 12px; }
  .ddot{ width:6px; height:6px; border-radius:50%; background:linear-gradient(135deg,var(--neon),var(--purple)); box-shadow:0 0 8px var(--purple); }
  .dcards{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .dcard{ border-radius:16px; padding:10px; background:var(--glass); border:1px solid var(--gbord); backdrop-filter:blur(10px); }
  .dimg{ height:56px; border-radius:11px; background:linear-gradient(135deg,rgba(34,211,255,.5),rgba(168,85,247,.4)); opacity:.85; }
  .dimg.alt{ background:linear-gradient(135deg,rgba(168,85,247,.5),rgba(255,120,40,.35)); }
  .dttl{ font-size:11px; color:#cbd0ee; margin-top:8px; font-weight:600; }
  .dsub{ font-size:8.5px; color:#6b7096; margin-top:3px; letter-spacing:.02em; }

  .foot{ text-align:center; margin-top:26px; font-size:8px; letter-spacing:.24em; color:#333a5c; }

  @keyframes rise{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:none; } }
  @keyframes float{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-6px); } }
</style>
</head>
<body>
  <div class="brand">
    <img class="logo" src="dhurta-logo.png" alt="Dhurta">
    <div class="bword">DHURTA</div>
    <div class="btag">SOVEREIGN · PRIVACY-NATIVE</div>
  </div>

  <div class="clock">
    <div class="t" id="t">--:--:--</div>
    <div class="d" id="d"></div>
  </div>

  <form onsubmit="return go(event)">
    <svg viewBox="0 0 24 24" fill="none" stroke="#22d3ff" stroke-width="1.7" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input id="q" type="text" placeholder="Search or enter address" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    <button type="submit">GO</button>
  </form>

  <div class="favs" id="favs"></div>

  <div class="discover">
    <div class="dhead"><span class="ddot"></span> Trending · Discover</div>
    <div class="dcards">
      <a class="dcard" href="https://search.brave.com/search?q=privacy+news" style="text-decoration:none">
        <div class="dimg"></div>
        <div class="dttl">Privacy this week</div>
        <div class="dsub">Curated · Brave Search</div>
      </a>
      <a class="dcard" href="https://search.brave.com/search?q=technology" style="text-decoration:none">
        <div class="dimg alt"></div>
        <div class="dttl">Tech &amp; Sovereignty</div>
        <div class="dsub">Curated · Brave Search</div>
      </a>
    </div>
  </div>

  <div class="foot">SOVEREIGN · PRIVACY-NATIVE · ZERO TELEMETRY</div>

<script>
  var FAVS = [
    { name:'Brave',     url:'https://search.brave.com', dom:'brave.com',     fb:'🦁' },
    { name:'YouTube',   url:'https://m.youtube.com',    dom:'youtube.com',   fb:'▶'  },
    { name:'Wikipedia', url:'https://wikipedia.org',    dom:'wikipedia.org', fb:'W'  },
    { name:'GitHub',    url:'https://github.com',       dom:'github.com',    fb:'◐'  },
    { name:'X',         url:'https://x.com',            dom:'x.com',         fb:'𝕏'  },
    { name:'Reddit',    url:'https://reddit.com',       dom:'reddit.com',    fb:'◈'  },
    { name:'Maps',      url:'https://maps.google.com',  dom:'google.com',    fb:'◍'  },
    { name:'Omni',      url:'dhurta://omni',            dom:'',              fb:'🔱' }
  ];
  var box = document.getElementById('favs');
  FAVS.forEach(function(f, i){
    var a = document.createElement('a');
    a.className = 'fav'; a.href = f.url; a.style.animationDelay = (0.12 + i*0.04) + 's';
    var icon;
    if (f.dom) {
      icon = '<img src="https://www.google.com/s2/favicons?sz=64&domain='+f.dom+'" ' +
             'onerror="this.style.display=&quot;none&quot;;this.nextSibling.style.display=&quot;block&quot;">' +
             '<span class="fallback" style="display:none;color:#22d3ff">'+f.fb+'</span>';
    } else {
      icon = '<img src="dhurta-logo.png">';
    }
    a.innerHTML = '<span class="ic">'+icon+'</span><em>'+f.name+'</em>';
    box.appendChild(a);
  });

  function pad(n){ return n<10 ? '0'+n : n; }
  function tick(){
    var x=new Date();
    document.getElementById('t').textContent = pad(x.getHours())+':'+pad(x.getMinutes())+':'+pad(x.getSeconds());
    document.getElementById('d').textContent = x.toDateString().toUpperCase();
  }
  setInterval(tick,1000); tick();

  function go(e){
    e.preventDefault();
    var v=document.getElementById('q').value.trim(); if(!v) return false;
    var isUrl=/^https?:\/\//i.test(v)||(v.indexOf('.')>0 && v.indexOf(' ')<0);
    location.href = isUrl ? (/^https?:\/\//i.test(v)?v:'https://'+v)
                          : 'https://search.brave.com/search?q='+encodeURIComponent(v);
    return false;
  }
</script>
</body>
</html>
