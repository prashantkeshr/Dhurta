<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Dhurta</title>
<style>
  /* ── Dark (default): obsidian + neon cyan + golden-orange ── */
  :root{
    --neon:#22d3ff; --purple:#a855f7; --saffron:#ff7a2f;
    --bg:#06060c; --text:#e9ecff; --muted:#767c9e; --dim:#5c6188;
    --glass:rgba(255,255,255,.055); --gbord:rgba(255,255,255,.10);
    --clock:#f2f5ff; --card-t:#cbd0ee; --card-s:#6b7096; --foot:#333a5c;
    --mesh1:rgba(34,211,255,.14); --mesh2:rgba(168,85,247,.16); --mesh3:rgba(34,211,255,.06);
    --grid:rgba(255,255,255,.026); --ph:#8b90b4; --gobtn-t:#04121a;
  }
  /* ── Light: warm paper + the same brand accents ── */
  :root[data-theme="light"]{
    --bg:#eef0f7; --text:#1b2030; --muted:#5a6078; --dim:#8a90ab;
    --glass:rgba(255,255,255,.72); --gbord:rgba(20,30,60,.10);
    --clock:#141a2c; --card-t:#2a3050; --card-s:#7a80a0; --foot:#a8adc4;
    --mesh1:rgba(34,211,255,.20); --mesh2:rgba(168,85,247,.16); --mesh3:rgba(255,122,47,.08);
    --grid:rgba(20,30,60,.04); --ph:#8a90ab; --gobtn-t:#ffffff;
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; user-select:none; }
  body{ background:
      radial-gradient(60% 40% at 20% 12%, var(--mesh1), transparent 60%),
      radial-gradient(55% 40% at 85% 22%, var(--mesh2), transparent 60%),
      radial-gradient(90% 60% at 50% 118%, var(--mesh3), transparent 70%),
      var(--bg);
    min-height:100%; padding:30px 20px 26px; overflow-x:hidden; transition:background .35s; }
  body::before{ content:""; position:fixed; inset:0; z-index:-1; background-image:
      linear-gradient(var(--grid) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:34px 34px; mask-image:radial-gradient(ellipse 70% 55% at 50% 30%,#000 40%,transparent 100%); }

  /* Theme toggle — top right */
  .theme{ position:fixed; top:14px; right:14px; z-index:10; width:40px; height:40px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:17px;
    background:var(--glass); border:1px solid var(--gbord); backdrop-filter:blur(12px);
    box-shadow:0 4px 18px -6px rgba(0,0,0,.35); transition:transform .2s; }
  .theme:active{ transform:scale(.86) rotate(30deg); }

  .brand{ text-align:center; margin-top:8px; animation:rise .6s cubic-bezier(.2,.8,.2,1) both; }
  .logo{ width:70px; height:70px; object-fit:contain; filter:drop-shadow(0 0 22px rgba(255,140,40,.5)); animation:float 5s ease-in-out infinite; }
  .bword{ font-size:15px; font-weight:800; letter-spacing:.44em; margin-top:7px; color:var(--saffron);
    text-shadow:0 0 20px rgba(255,90,20,.4); }
  .btag{ font-size:8px; letter-spacing:.3em; color:var(--dim); margin-top:5px; }

  .clock{ text-align:center; margin-top:20px; font-variant-numeric:tabular-nums; animation:rise .6s .05s cubic-bezier(.2,.8,.2,1) both; }
  .clock .t{ font-size:46px; font-weight:800; letter-spacing:.05em; color:var(--clock); text-shadow:0 0 30px rgba(34,211,255,.22); }
  .clock .d{ font-size:10px; letter-spacing:.28em; color:var(--muted); margin-top:4px; }

  /* THE address/search bar — single integrated field, gradient border */
  form{ margin:24px auto 0; max-width:520px; display:flex; align-items:center; gap:10px;
    background:var(--glass); border-radius:18px; padding:15px 16px; border:1px solid transparent;
    background-clip:padding-box; position:relative; backdrop-filter:blur(16px);
    animation:rise .6s .1s cubic-bezier(.2,.8,.2,1) both; }
  form::before{ content:""; position:absolute; inset:-1px; z-index:-1; border-radius:19px;
    background:linear-gradient(135deg,var(--neon),var(--purple) 55%,var(--saffron));
    opacity:.75; filter:blur(.5px); }
  form::after{ content:""; position:absolute; inset:0; z-index:-1; border-radius:18px; background:var(--bg); opacity:.92; }
  form svg{ width:18px; height:18px; flex:0 0 auto; }
  input{ flex:1; background:transparent; border:none; outline:none; color:var(--text);
    font:14px 'Segoe UI',sans-serif; min-width:0; }
  input::placeholder{ color:var(--ph); }
  button{ background:linear-gradient(135deg,var(--neon),var(--purple)); color:var(--gobtn-t); border:none;
    font:800 11px 'Segoe UI',sans-serif; letter-spacing:.14em; padding:9px 16px; border-radius:12px; cursor:pointer; }

  /* 4×2 frosted-glass grid — borderless, semi-transparent */
  .favs{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; max-width:520px; margin:24px auto 0; }
  .fav{ display:flex; flex-direction:column; align-items:center; gap:8px; text-decoration:none; color:var(--muted);
    animation:rise .5s cubic-bezier(.2,.8,.2,1) both; }
  .fav .ic{ width:54px; height:54px; border-radius:17px; display:flex; align-items:center; justify-content:center;
    background:var(--glass); backdrop-filter:blur(14px); overflow:hidden;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.09), 0 6px 20px -10px rgba(0,0,0,.5);
    transition:transform .18s, box-shadow .18s; }
  .fav .ic img{ width:28px; height:28px; object-fit:contain; }
  .fav .ic .fallback{ font-size:20px; font-weight:800; }
  .fav:active .ic{ transform:scale(.9); box-shadow:0 0 20px -2px var(--neon); }
  .fav em{ font-style:normal; font-size:9px; letter-spacing:.02em; }

  /* Trending / Discover — horizontal swipeable snap cards */
  .discover{ max-width:520px; margin:28px auto 0; animation:rise .6s .2s cubic-bezier(.2,.8,.2,1) both; }
  .dhead{ font-size:9px; letter-spacing:.24em; text-transform:uppercase; color:var(--muted);
    display:flex; align-items:center; gap:8px; margin:0 2px 12px; }
  .ddot{ width:6px; height:6px; border-radius:50%; background:linear-gradient(135deg,var(--neon),var(--purple)); box-shadow:0 0 8px var(--purple); }
  .dstrip{ display:flex; gap:12px; overflow-x:auto; scroll-snap-type:x mandatory; padding-bottom:6px;
    margin:0 -20px; padding-left:20px; padding-right:20px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .dstrip::-webkit-scrollbar{ display:none; }
  .dcard{ flex:0 0 62%; scroll-snap-align:start; border-radius:16px; padding:10px;
    background:var(--glass); backdrop-filter:blur(12px); text-decoration:none;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 8px 24px -12px rgba(0,0,0,.5); }
  .dimg{ height:64px; border-radius:11px; background:
      radial-gradient(80% 120% at 15% 0%, rgba(34,211,255,.55), transparent 60%),
      linear-gradient(135deg, rgba(168,85,247,.5), rgba(34,211,255,.35)); }
  .dimg.alt{ background:
      radial-gradient(80% 120% at 85% 0%, rgba(255,122,47,.5), transparent 60%),
      linear-gradient(135deg, rgba(168,85,247,.5), rgba(255,120,40,.3)); }
  .dimg.alt2{ background:
      radial-gradient(80% 120% at 50% 120%, rgba(34,211,255,.4), transparent 60%),
      linear-gradient(135deg, rgba(255,122,47,.4), rgba(168,85,247,.45)); }
  .dttl{ font-size:12px; color:var(--card-t); margin-top:9px; font-weight:700; }
  .dsub{ font-size:8.5px; color:var(--card-s); margin-top:3px; letter-spacing:.02em; }

  .foot{ text-align:center; margin-top:24px; font-size:8px; letter-spacing:.24em; color:var(--foot); }

  @keyframes rise{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:none; } }
  @keyframes float{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-6px); } }
</style>
</head>
<body>
  <div class="theme" id="themeBtn">🌙</div>

  <div class="brand">
    <img class="logo" src="dhurta-logo.png" alt="Dhurta">
    <div class="bword">DHURTA</div>
    <div class="btag">SOVEREIGN · PRIVACY-NATIVE</div>
  </div>

  <div class="clock">
    <div class="t" id="t">--:--:--</div>
    <div class="d" id="d"></div>
  </div>

  <form onsubmit="return go(event)">
    <svg viewBox="0 0 24 24" fill="none" stroke="#22d3ff" stroke-width="1.7" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input id="q" type="text" placeholder="Search or enter address" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    <button type="submit">GO</button>
  </form>

  <div class="favs" id="favs"></div>

  <div class="discover">
    <div class="dhead"><span class="ddot"></span> Trending · Discover</div>
    <div class="dstrip">
      <a class="dcard" href="https://search.brave.com/search?q=privacy+news">
        <div class="dimg"></div>
        <div class="dttl">Privacy this week</div>
        <div class="dsub">Curated · Brave Search</div>
      </a>
      <a class="dcard" href="https://search.brave.com/search?q=technology">
        <div class="dimg alt"></div>
        <div class="dttl">Tech &amp; Sovereignty</div>
        <div class="dsub">Curated · Brave Search</div>
      </a>
      <a class="dcard" href="https://search.brave.com/search?q=open+source+projects">
        <div class="dimg alt2"></div>
        <div class="dttl">Open Source Radar</div>
        <div class="dsub">Curated · Brave Search</div>
      </a>
      <a class="dcard" href="https://search.brave.com/search?q=cybersecurity+today">
        <div class="dimg"></div>
        <div class="dttl">Cyber Watch</div>
        <div class="dsub">Curated · Brave Search</div>
      </a>
    </div>
  </div>

  <div class="foot">SOVEREIGN · PRIVACY-NATIVE · ZERO TELEMETRY</div>

<script>
  /* ── theme toggle, persisted ── */
  var root = document.documentElement, tbtn = document.getElementById('themeBtn');
  try {
    var saved = localStorage.getItem('dhurta-theme');
    if (saved) root.setAttribute('data-theme', saved);
  } catch(e){}
  function paintBtn(){ tbtn.textContent = root.getAttribute('data-theme') === 'light' ? '☀️' : '🌙'; }
  paintBtn();
  tbtn.addEventListener('click', function(){
    var next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    root.setAttribute('data-theme', next);
    try { localStorage.setItem('dhurta-theme', next); } catch(e){}
    paintBtn();
  });

  var FAVS = [
    { name:'Brave',     url:'https://search.brave.com', dom:'brave.com',     fb:'🦁' },
    { name:'YouTube',   url:'https://m.youtube.com',    dom:'youtube.com',   fb:'▶'  },
    { name:'Wikipedia', url:'https://wikipedia.org',    dom:'wikipedia.org', fb:'W'  },
    { name:'GitHub',    url:'https://github.com',       dom:'github.com',    fb:'◐'  },
    { name:'X',         url:'https://x.com',            dom:'x.com',         fb:'𝕏'  },
    { name:'Reddit',    url:'https://reddit.com',       dom:'reddit.com',    fb:'◈'  },
    { name:'Maps',      url:'https://maps.google.com',  dom:'google.com',    fb:'◍'  },
    { name:'Omni',      url:'dhurta://omni',            dom:'',              fb:'🔱' }
  ];
  var box = document.getElementById('favs');
  FAVS.forEach(function(f, i){
    var a = document.createElement('a');
    a.className = 'fav'; a.href = f.url; a.style.animationDelay = (0.12 + i*0.04) + 's';
    var icon;
    if (f.dom) {
      icon = '<img src="https://www.google.com/s2/favicons?sz=64&domain='+f.dom+'" ' +
             'onerror="this.style.display=&quot;none&quot;;this.nextSibling.style.display=&quot;block&quot;">' +
             '<span class="fallback" style="display:none;color:#22d3ff">'+f.fb+'</span>';
    } else {
      icon = '<img src="dhurta-logo.png">';
    }
    a.innerHTML = '<span class="ic">'+icon+'</span><em>'+f.name+'</em>';
    box.appendChild(a);
  });

  function pad(n){ return n<10 ? '0'+n : n; }
  function tick(){
    var x=new Date();
    document.getElementById('t').textContent = pad(x.getHours())+':'+pad(x.getMinutes())+':'+pad(x.getSeconds());
    document.getElementById('d').textContent = x.toDateString().toUpperCase();
  }
  setInterval(tick,1000); tick();

  function go(e){
    e.preventDefault();
    var v=document.getElementById('q').value.trim(); if(!v) return false;
    var isUrl=/^https?:\/\//i.test(v)||(v.indexOf('.')>0 && v.indexOf(' ')<0);
    location.href = isUrl ? (/^https?:\/\//i.test(v)?v:'https://'+v)
                          : 'https://search.brave.com/search?q='+encodeURIComponent(v);
    return false;
  }
</script>
</body>
</html>
